naftiko: "1.0.0-alpha2"

info:
  label: "WISK Public Sales Upload API — Sales"
  description: >-
    Sales — Sales. 1 operation. Lead operation: Upload Sales Lines. Push an
    array of point-of-sale sales line items into a WISK venue account so sales
    can be reconciled against inventory. Self-contained Naftiko capability
    covering one WISK business surface.
  tags:
    - WISK
    - Sales
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      WISK_VENUE_ID: WISK_VENUE_ID

capability:

  # ── 1. Consumes — the upstream HTTP API this capability speaks to ─────
  consumes:
    - type: http
      namespace: "sales-upload-sales"
      baseUri: "https://api.wisk.ai"
      description: "WISK Public Sales Upload API — Sales business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: X-Wisk-Venue-Id
        value: "{{env.WISK_VENUE_ID}}"
        placement: header
      resources:
        - name: "public-sales-upload"
          path: "/public/sales/upload"
          operations:
            - name: "uploadSales"
              method: POST
              description: "Push an array of point-of-sale sales line items into a WISK venue account."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "A JSON array of sales line items to record against the venue."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  # ── 2. REST exposer ──────────────────────────────────────────────────
  exposes:
    - type: rest
      namespace: "sales-upload-sales-rest"
      port: 8080
      description: "REST adapter for WISK Public Sales Upload API — Sales. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/public/sales/upload"
          name: "public-sales-upload"
          description: "REST surface for the WISK public sales upload operation."
          operations:
            - method: POST
              name: "uploadSales"
              description: "Push an array of point-of-sale sales line items into a WISK venue account."
              call: "sales-upload-sales.uploadSales"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

  # ── 3. MCP exposer ───────────────────────────────────────────────────
    - type: mcp
      namespace: "sales-upload-sales-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for WISK Public Sales Upload API — Sales. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "upload-sales"
          description: "Push an array of point-of-sale sales line items into a WISK venue account."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "sales-upload-sales.uploadSales"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
