providerId: wisk
created: '2026-06-03'
modified: '2026-06-03'
reconciled: true
tags:
  - Inventory
  - Hospitality
  - Bar
  - Restaurant
  - Subscription
description: >-
  WISK.ai prices its hospitality inventory platform as a per-location monthly
  subscription billed annually, structured into three self-serve-to-white-glove
  tiers (Essentials, Professional, Premium) that scale on SKUs, AI-processed
  invoices, and users. A Food Inventory add-on layers onto the beverage tiers,
  and consumable "Human Review" invoice packs and a one-time onboarding boost
  are sold separately. Each tier carries a one-time guided setup / implementation
  fee. The public sales-upload API itself is not separately metered; it is part
  of the platform subscription and POS-integration onboarding handled by the
  WISK integrations team.
sources:
  - https://www.wisk.ai/price
