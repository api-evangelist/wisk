apis:
  - aid: wisk:sales-upload-api
    name: WISK Public Sales Upload API
    description: >-
      WISK's public sales-upload API lets POS providers and partners push sales data into customer WISK accounts. The
      documented operation is a POST to /public/sales/upload that accepts a JSON array of sales line items, each with
      id, date, plu_number, title, quantity, and total. The destination venue is identified by a WISK-provisioned venue
      unique identifier supplied in the request header. It is documented in a public Notion guide, and integrations are
      initiated by contacting the WISK integrations team. WISK can alternatively pull from a partner's own sales and
      product/menu APIs.
    humanURL: https://help.wisk.ai/en/articles/5071983-integrating-with-wisk-for-pos-providers
    baseURL: https://api.wisk.ai
    tags:
      - Sales
      - POS Integration
      - Upload
