aid: wisk
name: WISK.ai
description: >-
  WISK.ai is an inventory management and hospitality intelligence platform for bars, restaurants, and hotels, covering
  inventory counts, invoicing, purchasing, recipe costing, and cost-of-goods tracking. It syncs with 60+ POS systems to
  align sales with inventory. WISK's integration surface is built for POS and data partners rather than a broad public
  developer program: partners can let WISK pull from their sales and product/menu APIs, or push daily sales data into
  WISK using its public sales-upload API, which is documented in a public Notion guide. New integrations begin by
  contacting the WISK integrations team, and email-based CSV/XLS feeds are supported as a fallback.
type: Index
