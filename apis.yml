apis:
  - aid: wisk:sales-upload-api
    name: WISK Public Sales Upload API
    description: >-
      WISK's public sales-upload API lets POS providers and partners push sales
      data into customer WISK accounts. Minimum fields include POS code, item
      name, quantity sold, and net sales. It is documented in a public Notion
      guide, and integrations are initiated by contacting the WISK integrations
      team. WISK can alternatively pull from a partner's own sales and
      product/menu APIs.
    humanURL: https://help.wisk.ai/en/articles/5071983-integrating-with-wisk-for-pos-providers
