  - type: Features
    data:
      - name: Sales Upload API
        description: >-
          Push point-of-sale sales lines into a WISK venue account via a single POST to /public/sales/upload accepting a
          JSON array of line items.
      - name: POS Pull Integrations
        description: >-
          WISK can pull from a partner's own Sales API and Product/Menu API to ingest sales and item data into customer
          accounts.
      - name: CSV/XLS Email Fallback
        description: >-
          For POS systems without an API, automated daily sales or product-mix reports can be emailed to WISK in XLS or
          CSV format.
      - name: Inventory and Cost Tracking
        description: >-
          Inventory counts, invoicing, purchasing, recipe costing, and cost-of-goods tracking across bars, restaurants,
          and hotels.
  - type: UseCases
    data:
      - name: POS Provider Integration
        description: A POS platform integrates with WISK so its venues' sales data flows into WISK for inventory reconciliation.
      - name: Daily Sales Reconciliation
        description: Push daily sales lines so WISK can deplete inventory against actual POS sales and surface variance.
      - name: Multi-Location Inventory
        description: Operators manage inventory, invoices, and cost of goods across multiple venues from one platform.
  - type: Integrations
    data:
      - name: Direct POS Integrations
        description: >-
          60+ POS systems including Toast, Square, Clover, Lightspeed, Revel, TouchBistro, Heartland, Aldelo, Arryved,
          and many more.
      - name: Omnivore Universal API
        description: >-
          Several POS systems integrate through Omnivore's Universal API, including Aloha, Brink, Oracle Hospitality
          (Micros/Simphony), POSitouch, and Doshii-connected systems.
